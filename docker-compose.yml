version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nextalk_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nextalk
    ports:
      - "5432:5432"
    volumes:
      - nextalk_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nextalk_redis
    ports:
      - "6379:6379"
    volumes:
      - nextalk_redis_data:/data
    restart: unless-stopped

volumes:
  nextalk_pgdata:
  nextalk_redis_data:
